# Prometheus Configuration for AI Voice Agent Monitoring
global:
  scrape_interval: 15s  # Scrape metrics every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'ai-voice-agent'
    environment: 'production'

# Scrape configurations
scrape_configs:
  # AI Voice Agent RTP Metrics
  # Scraping from voiceagent container on voip-net network
  # Port 8001 is the Metrics API Server (custom Prometheus metrics in Prometheus format)
  - job_name: 'ai-voice-agent'
    static_configs:
      - targets: ['voiceagent:8001']
        labels:
          service: 'rtp-server'
          component: 'voice-agent'

    # Scrape metrics endpoint
    metrics_path: '/metrics'

    # Timeout for scraping
    scrape_timeout: 10s

    # Keep only Prometheus format metrics
    metric_relabel_configs:
      # Add custom labels
      - source_labels: [__name__]
        regex: 'rtp_.*|rtcp_.*|dtmf_.*'
        action: keep

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'
