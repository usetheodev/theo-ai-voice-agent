version: '3.8'

services:
  # ===== ASTERISK (SIP Gateway para testes E2E) =====
  asterisk:
    build:
      context: ./docker/asterisk
      dockerfile: Dockerfile
    container_name: asterisk
    hostname: asterisk
    restart: unless-stopped

    environment:
      # Configuração para conectar com nosso voiceagent
      - AI_AGENT_HOST=voiceagent
      - AI_AGENT_PORT=5060

    ports:
      # SIP (Asterisk exposto externamente)
      - "5060:5060/udp"
      - "5060:5060/tcp"

      # RTP range (Asterisk)
      - "10000-10100:10000-10100/udp"

      # ARI HTTP (Asterisk REST Interface)
      - "8088:8088/tcp"

      # HTTPS/WSS for WebRTC Browser-Phone (REQUIRED)
      - "8089:8089/tcp"

    networks:
      voip-net:
        ipv4_address: 172.20.0.10

    volumes:
      - asterisk-logs:/var/log/asterisk
      - asterisk-lib:/var/lib/asterisk
      - asterisk-spool:/var/spool/asterisk

    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===== AI VOICE AGENT (Nosso sistema SIP Server) =====
  voiceagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-voice-agent
    hostname: voiceagent
    restart: unless-stopped

    depends_on:
      asterisk:
        condition: service_healthy

    environment:
      # SIP Server config
      - SIP_HOST=0.0.0.0
      - SIP_PORT=5060
      - SIP_REALM=voiceagent

      # RTP config
      - RTP_PORT_START=10200
      - RTP_PORT_END=10300

      # ASR Provider (whisper, distil-whisper, parakeet)
      - ASR_PROVIDER=distil-whisper

      # Distil-Whisper Config (6x faster than Whisper)
      - DISTIL_WHISPER_MODEL=distil-large-v3
      - DISTIL_WHISPER_LANGUAGE=pt
      - DISTIL_WHISPER_DEVICE=cpu
      - DISTIL_WHISPER_COMPUTE_TYPE=int8

      # AI Models (legacy)
      - ASR_MODEL=openai/whisper-large-v3
      - LLM_MODEL=Qwen/Qwen2.5-7B
      - TTS_MODEL=kokoro-tts

      # Logging
      - LOG_LEVEL=INFO

      # Metrics API
      - METRICS_PORT=8001

      # GPU (comentar se usar CPU-only)
      - CUDA_VISIBLE_DEVICES=0

    ports:
      # SIP (voiceagent exposto na porta 5080 do host para evitar conflito)
      # Asterisk (5060) → voiceagent (5080 host → 5060 container)
      - "5080:5060/udp"
      - "5080:5060/tcp"

      # RTP range (voiceagent - range diferente do Asterisk)
      - "10200-10300:10200-10300/udp"

      # Metrics API Server (Prometheus format)
      - "8001:8001/tcp"

    networks:
      voip-net:
        ipv4_address: 172.20.0.20

    volumes:
      - ./config:/app/config
      - ./src:/app/src  # Mount source for development
      - ./logs:/app/logs
      - ./models:/app/models  # Cache for AI models

    env_file:
      - .env

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Mais tempo para carregar modelos AI

  # ===== PROMETHEUS (Monitoring - opcional) =====
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

    networks:
      - voip-net

    profiles:
      - monitoring

  # ===== GRAFANA (Visualization - opcional) =====
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources

    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=

    networks:
      - voip-net

    profiles:
      - monitoring

# ===== NETWORKS =====
networks:
  voip-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ===== VOLUMES =====
volumes:
  # Asterisk volumes
  asterisk-logs:
  asterisk-lib:
  asterisk-spool:

  # Monitoring volumes
  prometheus-data:
  grafana-data:
