version: '3.8'

services:
  asterisk:
    build:
      context: ./docker/asterisk
      dockerfile: Dockerfile
    container_name: asterisk
    hostname: asterisk
    restart: unless-stopped

    environment:
      - AI_AGENT_HOST=${AI_AGENT_HOST:-ai-agent}
      - AI_AGENT_PORT=${AI_AGENT_PORT:-5080}

    ports:
      # SIP
      - "5060:5060/udp"
      - "5060:5060/tcp"
      # RTP range (101 ports for PoC)
      - "10000-10100:10000-10100/udp"
      # ARI HTTP (Asterisk REST Interface)
      - "8088:8088/tcp"
      # HTTP + HTTPS/WSS for WebRTC Browser Phone
      - "8090:8080/tcp"
      - "8089:8089/tcp"

    networks:
      voip-net:
        ipv4_address: 172.20.0.10

    volumes:
      - asterisk-logs:/var/log/asterisk
      - asterisk-lib:/var/lib/asterisk
      - asterisk-spool:/var/spool/asterisk

    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ai-agent:
    build:
      context: .
      dockerfile: ./docker/ai-agent/Dockerfile
    container_name: ai-agent
    hostname: ai-agent
    restart: unless-stopped

    environment:
      - RTP_PORT=${RTP_PORT:-5080}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - LLM_MODEL=${LLM_MODEL:-phi-3-mini}
      - TTS_VOICE=${TTS_VOICE:-pt_BR-faber-medium}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - APP_ENV=${APP_ENV:-development}

    ports:
      # RTP
      - "5080:5080/udp"
      # Prometheus metrics (optional)
      - "9090:9090/tcp"

    networks:
      voip-net:
        ipv4_address: 172.20.0.20

    volumes:
      - ./src:/app/src:ro
      - ai-models:/app/models
      - ai-logs:/app/logs

    depends_on:
      asterisk:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "nc", "-z", "-u", "127.0.0.1", "5080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  voip-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  asterisk-logs:
    driver: local
  asterisk-lib:
    driver: local
  asterisk-spool:
    driver: local
  ai-models:
    driver: local
  ai-logs:
    driver: local
