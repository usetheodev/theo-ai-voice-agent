;
; Asterisk HTTP Server Configuration
;

[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088
enablestatic=yes
sessionlimit=1000
redirect=/ /static/index.html

; TLS for WebRTC (required for WebSocket Secure)
tlsenable=yes
tlsbindaddr=0.0.0.0:8089
tlscertfile=/etc/asterisk/certs/certificate.pem
tlsprivatekey=/etc/asterisk/certs/private.pem
