;
; PJSIP Configuration for AI Voice Agent PoC
;

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=172.20.0.10
external_signaling_address=172.20.0.10

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089

; Extension 1000 - Test endpoint for AI Agent
[1000]
type=endpoint
context=default
disallow=all
allow=alaw
allow=ulaw
aors=1000
auth=1000
direct_media=no
ice_support=no

[1000]
type=aor
max_contacts=1
remove_existing=yes

[1000]
type=auth
auth_type=userpass
username=1000
password=1000

; WebRTC endpoint for browser testing
[webrtc]
type=endpoint
context=default
transport=transport-wss
disallow=all
allow=ulaw
allow=alaw
# opus removed - codec_opus.so not available in container
aors=webrtc
auth=webrtc
direct_media=no
ice_support=yes
webrtc=yes
dtls_auto_generate_cert=yes
media_encryption=dtls
rtp_keepalive=30
rtp_symmetric=yes

[webrtc]
type=aor
max_contacts=5
remove_existing=yes

[webrtc]
type=auth
auth_type=userpass
username=webrtc
password=1234
