apiVersion: 1

datasources:
  - name: Prometheus
    uid: voice-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "10s"

  - name: Jaeger
    uid: voice-jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
