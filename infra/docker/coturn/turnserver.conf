# TURN server configuration for AI Voice Agent
# See: https://github.com/coturn/coturn/blob/master/examples/etc/turnserver.conf

# Listener port for STUN/TURN
listening-port=3478

# TLS listener port (optional, for secure connections)
tls-listening-port=5349

# Relay ports range
min-port=49152
max-port=65535

# Fingerprint in TURN message
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Realm for the TURN server
realm=ai-inference.local

# Server name
server-name=ai-inference.local

# Default user credentials (change in production!)
# Format: user:password
user=ai-inference:changeme-turn-password

# Log level (0=minimal, 4=verbose)
log-file=/var/log/turnserver.log
verbose

# Disable CLI (not needed in container)
no-cli

# No TLS certificate by default (configure in production)
# cert=/etc/ssl/certs/turn_server_cert.pem
# pkey=/etc/ssl/private/turn_server_pkey.pem

# Disable multicast peers
no-multicast-peers

# Disable loopback peers for security
no-loopback-peers

# Mobility with ICE (mobile devices)
mobility

# Stale nonce lifetime in seconds
stale-nonce=600

# Max allocations per user
max-allocate-lifetime=3600
