# AI Voice Agent - Default Configuration

# ===== SIP SERVER =====
sip:
  # Network
  host: 0.0.0.0
  port: 5060  # Changed to 5060 to match Asterisk expectations
  external_ip: null  # Auto-detect if null, or set to public IP

  # Codecs (in priority order)
  codecs:
    - PCMU
    - PCMA
    - opus

  # Authentication
  auth_enabled: true  # Set to false to disable authentication (NOT RECOMMENDED for production)
  realm: voiceagent

  # Limits
  max_concurrent_calls: 100
  ringing_timeout: 60  # seconds

  # Authorized trunks (digest authentication - SHA-256 with MD5 fallback)
  trunks:
    - username: carrier_demo
      password: demo123
      trunk_id: trunk-demo-001

    # Add more trunks here:
    # - username: carrier_prod
    #   password: secret_password
    #   trunk_id: trunk-prod-001

  # IP whitelist (no authentication required)
  ip_whitelist:
    # - 203.0.113.0/24  # Carrier ABC
    # - 198.51.100.0/24 # Carrier XYZ

  # IP blacklist (permanently blocked)
  ip_blacklist: []
    # - 192.0.2.100  # Example malicious IP

  # Rate Limiting (DDoS protection)
  rate_limit:
    enabled: true  # Set to false to disable rate limiting (NOT RECOMMENDED for production)
    requests_per_minute: 60  # Max requests per minute per IP (60 = 1 request/second)
    burst_size: 10  # Allow burst of N requests before rate limiting kicks in
    ban_threshold: 5  # Ban IP after N rate limit violations within window
    ban_duration_seconds: 300  # Ban for 5 minutes (300s)
    violation_window_seconds: 60  # Track violations in 60-second window
    cleanup_interval_seconds: 300  # Cleanup old entries every 5 minutes


# ===== RTP SERVER =====
rtp:
  # Port allocation
  port_start: 10000
  port_end: 20000

  # Codec priority (order matters!)
  codec_priority:
    - PCMU    # G.711 μ-law (standard USA)
    - PCMA    # G.711 A-law (standard Europe)
    # - opus  # TODO: Implement Opus codec

  # Security
  ip_validation_enabled: true  # Validate RTP packets are from expected IP (anti-hijacking)

  # Jitter Buffer (Adaptive - RFC 3550)
  jitter_buffer_initial_ms: 60   # Initial buffer depth (default: 60ms)
  jitter_buffer_min_ms: 20       # Minimum depth for low latency (default: 20ms)
  jitter_buffer_max_ms: 300      # Maximum depth for high jitter networks (default: 300ms)
  jitter_buffer_adaptation_rate: 0.1  # How fast to adapt 0.0-1.0 (default: 0.1)

  # DTMF
  dtmf_detection: true
  dtmf_min_duration_ms: 40      # Minimum duration to consider valid

  # Timeouts
  rtp_timeout_ms: 5000          # No RTP for 5s → consider stream dead


# ===== AI PIPELINE =====
ai:
  # ASR (Automatic Speech Recognition)
  asr_model: openai/whisper-base  # Model identifier (for documentation)
  asr_model_path: models/whisper/ggml-base.bin  # Path to GGML model file
  asr_language: pt  # Force Portuguese (auto-detect if null)
  asr_threads: 4  # CPU threads for inference (tune based on hardware: 2-8)

  # LLM (Large Language Model)
  llm_model: TinyLlama/TinyLlama-1.1B-Chat-v1.0  # Ultra-lightweight model (~1GB RAM, very fast)
  llm_max_tokens: 128         # Max response length (reduced for faster inference)
  llm_temperature: 0.7        # 0.0 = deterministic, 1.0 = creative

  # TTS (Text-to-Speech)
  tts_model: kokoro-tts
  tts_voice: pf_dora  # Brazilian Portuguese voices: pf_dora (female), pm_alex (male), pm_santa (male)
  tts_speed: 1.0      # 0.5-2.0

  # VAD (Voice Activity Detection)
  vad_threshold: 0.2             # 0.0 = very sensitive, 1.0 = not sensitive (lowered for telephone audio)
  vad_min_speech_duration_ms: 200  # Minimum 200ms to consider speech (reduced for better detection)

  # System prompt
  system_prompt: |
    Você é um assistente de voz prestativo e amigável.
    Responda de forma concisa e natural, como em uma conversa telefônica.
    Mantenha respostas curtas (1-3 frases).

    Informações úteis:
    - Você está atendendo chamadas telefônicas
    - O usuário está falando por telefone (não pode ver telas)
    - Seja objetivo e direto


# ===== LOGGING =====
log_level: INFO  # DEBUG, INFO, WARNING, ERROR

# ===== MONITORING =====
metrics_port: 8000  # Prometheus metrics endpoint at http://localhost:8000/metrics


# ===== ADVANCED (optional) =====

# GPU optimization
gpu:
  enabled: true
  device_map: auto  # 'auto' or specific GPU id (0, 1, etc.)

# Model quantization (reduce memory usage)
quantization:
  enabled: false  # Set to true for 4-bit quantization
  bits: 4         # 4 or 8

# Performance tuning
performance:
  max_concurrent_ai_pipelines: 10  # Max concurrent AI processing
  ai_worker_pool_size: 4           # Thread pool for blocking AI calls
