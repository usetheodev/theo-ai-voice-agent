;
; Dialplan for AI Voice Agent PoC
;

[general]
static=yes
writeprotect=no
clearglobalvars=no

[default]
; Extension 9999 - AI Voice Agent
; Routes call to Stasis application "aiagent"
; Python app will handle ExternalMedia bridge
exten => 9999,1,NoOp(=== AI Voice Agent Call ===)
 same => n,Answer()
 same => n,Stasis(aiagent)
 same => n,Hangup()

; Extension 100 - Echo test
exten => 100,1,NoOp(=== Echo Test ===)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()
