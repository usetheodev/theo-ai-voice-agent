; ============================================================================
; Dialplan for AI Voice Agent Testing
; ============================================================================
;
; Extension Plan:
;   100 → AI Voice Agent (main test)
;   101 → Echo test (verify audio path)
;   102 → Playback test (verify Asterisk audio)
;   103 → Milliwatt test (1000Hz tone)
;   1000-1002 → Call other softphones (peer-to-peer)
;
; ============================================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

; ============================================================================
; DEFAULT CONTEXT (Softphone users)
; ============================================================================

[default]

; ===== Extension 100: Call AI Voice Agent =====
exten => 100,1,NoOp(=== Calling AI Voice Agent ===)
 same => n,Set(CHANNEL(language)=pt_BR)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Log(NOTICE, User ${CALLERID(num)} calling AI Agent)
 same => n,Dial(PJSIP/voiceagent-endpoint/sip:agent@voiceagent:5060,60,rtT)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered:failed)
 same => n(answered),NoOp(Call answered by AI Agent)
 same => n,Hangup()
 same => n(failed),NoOp(Call failed: ${DIALSTATUS})
 same => n,Playback(the-party-you-are-calling&is-curntly-unavail)
 same => n,Hangup()

; ===== Extension 101: Echo Test =====
exten => 101,1,NoOp(=== Echo Test ===)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; ===== Extension 102: Playback Test =====
exten => 102,1,NoOp(=== Playback Test ===)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Playback(hello-world)
 same => n,Playback(demo-congrats)
 same => n,Playback(goodbye)
 same => n,Hangup()

; ===== Extension 103: Milliwatt Test (1000Hz tone) =====
exten => 103,1,NoOp(=== Milliwatt Test ===)
 same => n,Answer()
 same => n,Playtones(1000)
 same => n,Wait(30)
 same => n,StopPlaytones()
 same => n,Hangup()

; ===== Extensions 1000-1002: Call other users =====
exten => 1000,1,Dial(PJSIP/1000,30,rtT)
 same => n,Voicemail(1000@default,u)
 same => n,Hangup()

exten => 1001,1,Dial(PJSIP/1001,30,rtT)
 same => n,Voicemail(1001@default,u)
 same => n,Hangup()

exten => 1002,1,Dial(PJSIP/1002,30,rtT)
 same => n,Voicemail(1002@default,u)
 same => n,Hangup()

; ===== Invalid extension =====
exten => _X.,1,NoOp(Invalid extension: ${EXTEN})
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Playback(pbx-invalid)
 same => n,Hangup()

; ===== Hangup handler =====
exten => h,1,NoOp(Call ended: Duration=${CDR(duration)}s)

; ============================================================================
; FROM-VOICEAGENT CONTEXT
; ============================================================================
; Calls coming FROM the AI Voice Agent (if any)

[from-voiceagent]

exten => _X.,1,NoOp(Call from VoiceAgent to ${EXTEN}: ${CALLERID(all)})
 same => n,Answer()
 same => n,Playback(demo-thanks)
 same => n,Hangup()

; ============================================================================
; FROM-EXTERNAL CONTEXT
; ============================================================================
; Calls from external SIP trunks (production)

[from-external]

exten => _X.,1,NoOp(External call to extension ${EXTEN})
 same => n,Goto(default,${EXTEN},1)
