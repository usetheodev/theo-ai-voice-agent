; ============================================================================
; HTTP/HTTPS Configuration for Browser-Phone (WebRTC)
; ============================================================================

[general]
; ===== HTTP (for ARI and development) =====
enabled=yes
bindaddr=0.0.0.0
bindport=8088

; ===== HTTPS (REQUIRED for WebRTC/WebSocket) =====
tlsenable=yes
tlsbindaddr=0.0.0.0:8089
tlscertfile=/etc/asterisk/keys/asterisk.pem
tlsprivatekey=/etc/asterisk/keys/asterisk.key

; ===== Static Files (Browser-Phone) =====
enablestatic=yes

; Redirect root to Browser-Phone interface
redirect = / /static/Phone/index.html

; ===== Session Configuration =====
session_limit=1000
session_inactivity=30000
session_keep_alive=15000
