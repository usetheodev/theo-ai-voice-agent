[general]
context=default
bindaddr=0.0.0.0
bindport=5060
transport=udp,tcp

; Network settings
externip=172.20.0.10
localnet=172.20.0.0/255.255.0.0

; RTP settings
rtpstart=10000
rtpend=10100

; Codecs
disallow=all
allow=ulaw
allow=alaw
allow=opus

; Security
alwaysauthreject=yes
allowguest=no

; ===== VOICEAGENT TRUNK =====
; Trunk para nosso AI Voice Agent
[voiceagent]
type=peer
host=voiceagent          ; Hostname do container
port=5060
context=from-voiceagent
qualify=yes
nat=no

; Codecs
disallow=all
allow=ulaw
allow=alaw

; DTMF
dtmfmode=rfc2833

; Security (sem autenticação para testes)
insecure=port,invite

; ===== TEST USER (para testes com softphone) =====
[testuser]
type=friend
context=default
secret=test123
host=dynamic

; Codecs
disallow=all
allow=ulaw
allow=alaw

; DTMF
dtmfmode=rfc2833

; NAT
nat=force_rport,comedia
