; ============================================================================
; Asterisk Module Configuration for AI Voice Agent
; ============================================================================

[modules]
autoload=yes

; ===== CORE MODULES =====
load => res_pjsip.so
load => res_pjsip_session.so
load => res_pjsip_endpoint_identifier_ip.so
load => res_pjsip_endpoint_identifier_user.so
load => res_pjsip_authenticator_digest.so
load => res_pjsip_dialog_info_body_generator.so
load => res_pjsip_dtmf_info.so
load => res_pjsip_log_forwarder.so
load => res_pjsip_notify.so
load => res_pjsip_outbound_registration.so
load => res_pjsip_refer.so
load => res_pjsip_registrar.so
load => res_pjsip_t38.so
load => res_pjsip_transport_websocket.so
load => res_pjsip_mwi.so
load => res_pjsip_nat.so
load => res_pjsip_sdp_rtp.so

; ===== CHANNEL DRIVERS =====
load => chan_pjsip.so

; Legacy SIP (desabilitar para evitar conflito de porta)
noload => chan_sip.so

; ===== CODECS =====
; Audio codecs
load => codec_ulaw.so
load => codec_alaw.so
load => codec_g722.so
load => codec_opus.so
load => codec_resample.so

; Video codecs (for WebRTC video calls)
load => codec_vp8.so
load => codec_h264.so

; ===== APPLICATIONS =====
load => app_dial.so
load => app_echo.so
load => app_playback.so
load => app_voicemail.so
load => app_directory.so
load => app_confbridge.so
load => app_queue.so

; ===== FORMATS =====
load => format_wav.so
load => format_gsm.so
load => format_pcm.so
load => format_sln.so

; ===== FUNCTIONS =====
load => func_callerid.so
load => func_cdr.so
load => func_channel.so
load => func_db.so
load => func_strings.so

; ===== CDR (Call Detail Records) =====
load => cdr_csv.so

; ===== RES (Resources) =====
load => res_ari.so
load => res_ari_applications.so
load => res_ari_asterisk.so
load => res_ari_bridges.so
load => res_ari_channels.so
load => res_ari_device_states.so
load => res_ari_endpoints.so
load => res_ari_events.so
load => res_ari_playbacks.so
load => res_ari_recordings.so
load => res_ari_sounds.so
load => res_http_websocket.so
load => res_stasis.so
load => res_stasis_answer.so
load => res_stasis_playback.so
load => res_stasis_recording.so

; ===== BRIDGE =====
load => bridge_builtin_features.so
load => bridge_native_rtp.so
load => bridge_simple.so
load => bridge_softmix.so

; ===== RTP =====
load => res_rtp_asterisk.so
load => res_rtp_multicast.so

; ===== TIMING =====
load => res_timing_timerfd.so

; ===== OPTIONAL (Disable for minimal setup) =====
; WebRTC Support
;load => res_http_websocket.so
;load => res_pjsip_transport_websocket.so

; Music on Hold
;load => res_musiconhold.so

; AGI (Asterisk Gateway Interface)
;load => res_agi.so

; ===== DISABLE UNNECESSARY =====
noload => chan_dahdi.so
noload => chan_iax2.so
noload => chan_mgcp.so
noload => chan_skinny.so
noload => chan_unistim.so
noload => chan_mobile.so
