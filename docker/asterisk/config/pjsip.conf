; ============================================================================
; PJSIP Configuration for AI Voice Agent Testing
; ============================================================================
;
; Topology:
;   Softphone (Zoiper/Linphone) → Asterisk (172.20.0.10) → AI Voice Agent (172.20.0.20)
;
; Test Users:
;   - testuser (1000): Para conectar softphone e fazer chamadas
;   - alice (1001): Usuário adicional para testes
;   - bob (1002): Usuário adicional para testes
;
; ============================================================================

[global]
; Logging
debug=yes

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=172.20.0.10
external_signaling_address=172.20.0.10
local_net=172.20.0.0/16

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
external_media_address=172.20.0.10
external_signaling_address=172.20.0.10
local_net=172.20.0.0/16

; ============================================================================
; AI VOICE AGENT TRUNK
; ============================================================================
; Trunk para nosso sistema AI Voice Agent
; Chamadas serão roteadas: Softphone → Asterisk → AI Agent

[voiceagent-endpoint]
type=endpoint
context=from-voiceagent
transport=transport-udp
disallow=all
allow=ulaw
allow=alaw
allow=opus
aors=voiceagent-aor
direct_media=no
trust_id_inbound=yes
send_pai=yes

[voiceagent-aor]
type=aor
contact=sip:voiceagent:5060
qualify_frequency=60

[voiceagent-identify]
type=identify
endpoint=voiceagent-endpoint
match=172.20.0.20

; ============================================================================
; TEMPLATES (reutilizáveis)
; ============================================================================

[webrtc_endpoint](!)
type=endpoint
context=default
transport=transport-wss
disallow=all
allow=opus
allow=ulaw
allow=alaw
webrtc=yes
dtls_auto_generate_cert=yes
use_avpf=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
direct_media=no

; ============================================================================
; BROWSER-PHONE USERS (WebRTC)
; ============================================================================

; ===== WEBRTC USER: webrtc (extension 100) =====
[webrtc]
type=endpoint
context=default
transport=transport-wss
disallow=all
allow=ulaw
allow=alaw
allow=opus
allow=vp8
allow=h264
aors=webrtc
auth=webrtc
direct_media=no
ice_support=yes
webrtc=yes
dtls_auto_generate_cert=yes
media_encryption=dtls
rtp_keepalive=30
rtp_symmetric=yes
use_avpf=yes
rtcp_mux=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=rfc4733
callerid="WebRTC User" <100>

[webrtc]
type=aor
max_contacts=5
remove_existing=yes

[webrtc]
type=auth
auth_type=userpass
username=webrtc
password=1234


; ============================================================================
; SOFTPHONE USERS (para testes - UDP)
; ============================================================================

; ===== USER 1000: testuser (principal) =====
[1000]
type=endpoint
context=default
transport=transport-udp
auth=1000-auth
aors=1000-aor

; Codecs
disallow=all
allow=ulaw
allow=alaw
allow=opus

; Audio settings
force_rport=yes
rewrite_contact=yes
direct_media=no
rtp_symmetric=yes

; NAT support
ice_support=yes
use_avpf=yes

; DTMF
dtmf_mode=rfc4733

; Caller ID
callerid="Test User" <1000>

[1000-auth]
type=auth
auth_type=userpass
username=testuser
password=test123
realm=asterisk

[1000-aor]
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=60

